name: Publish to PyPI
on:
  push:
    tags:
      - 'v*' # Triggers on v0.1.0, v0.1.1, etc.

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      # These two are REQUIRED for Trusted Publishing
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install build

      - name: Build binary wheel and source tarball
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password/token needed here because of Trusted Publishing!
          print-hash: true